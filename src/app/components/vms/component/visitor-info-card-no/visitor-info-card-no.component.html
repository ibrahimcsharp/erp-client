<div class="container-fluid">
    <div class="row">
        <div class="offset-3 col-3">
            <div class="visitor-card-container" *ngIf="visitorData">
                <div class="visitor-card">
                    <div class="logo">
                        <img src="../../../../../assets/images/vms/logo1.JPG" alt="image here" />
                    </div>
                    <div class="visitor-card-upper-part">
                        <div class="outer-circle">
                            <div class="inner-circle">
                                <img [src]="imagePath" />
                            </div>
                        </div>
                    </div>
                    <div class="visitor-name">
                        <h2>{{visitorData.visitorname}}</h2>
                    </div>
                    <div class="other-info">
                        <ul>
                            <li><span>Visitor Number</span>{{visitorData.visitorcardnumber}}</li>
                            <li><span>Mobile Number</span>{{visitorData.visitormobilenumber}}</li>
                            <li><span>Company Name</span>{{visitorData.visitorcompany}}</li>
                        </ul>
                    </div>
                    <div class="footer-logo">
                        <h1>SNOWTEX</h1>
                    </div>
                </div>
            </div>

        </div>

    </div>
</div>
