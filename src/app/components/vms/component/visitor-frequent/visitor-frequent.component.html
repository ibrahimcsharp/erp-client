<p-panel header="VISITOR LIST" [toggleable]="true">
    <ng-template pTemplate="icons">
        <button pButton class="p-panel-header-icon p-link">
            <span class="pi pi-cog"></span>
        </button>

    </ng-template>
    <!-- <form [formGroup]="visitorApproveForm"> -->
    <form [formGroup]="">

        <p-table #dt rowExpandMode="single" expandableRows="true" [globalFilterFields]="['']" dataKey="id"
            editMode="row" [scrollable]="true" scrollHeight="500px" [value]="frequentVisitorList" [paginator]="true"
            [rows]="08" [showCurrentPageReport]="true"
            currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
            [rowsPerPageOptions]="[5, 10, 50, 100]">

            <ng-template pTemplate="header" let-rowData let-expanded="expanded" let-ri="rowIndex">

                <tr style="text-align: center;">
                    <th>SL</th>
                    <th>Visitor Name</th>
                    <th>Visitor Contact</th>
                    <th>Check in Count</th>
                    <th>Card View</th>

                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-rowData let-expanded="expanded" let-ri="rowIndex">
                <tr>
                    <td>{{ri+1}}</td>

                    <td>{{rowData.visitorname}}</td>

                    <td>
                        {{rowData.visitormobilenumber}}
                    </td>
                    <td>
                        {{rowData.visitorCount}}
                        </td>
                    <td>

                        <button pButton pRipple type="button" label="Card-View" icon="{{rowData.approveIcon}}"
                            class="p-button-raised p-button-success p-button-text"
                            style="background: #80ff80;height: 22px;width: 70px;color: black;font-weight: bold;font-size: 8px!important;"
                            (click)="CardView(rowData.id)">
                        </button>

                    </td>
                </tr>
            </ng-template>

            <!-- <ng-template pTemplate="header">
                <tr class="bc">
                    <th>SL</th>
                    <th>visitorname</th>
                    <th>visitor-mobile</th>

                </tr>
            </ng-template>
            <ng-template pTemplate="body"> 
                <tr>
                    <div>
                        <td>{{ri+1}}</td>
                        <td>{{rowData.visitorname}}</td>
                        <td>{{rowData.visitormobilenumber}}</td>
                    </div>

                </tr>
            </ng-template> -->

        </p-table>
    </form>
</p-panel>
