<div class="text-align: center, margin-left:20px" style="text-align: center;margin-left:20px">
    <div class="btn-group">

        <button type="button" (click)="takeSnapshot()" class="btn btn-primary">
            Take Picture
        </button>

        <button type="button" (click)="onOffWebCame()" class="btn btn-primary">
            Switch Camera
        </button>
        <!-- <button type="button" (click)="checkpermission()" class="btn btn-primary">
            Check Permission
        </button> -->
    </div>
    <br /><br />
    <webcam [height]="470" [width]="1000" [trigger]="triggerObservable" (imageCapture)="handleImage($event)"
        *ngIf="showWebcam" [switchCamera]="nextWebcamObservable">
    </webcam>
</div>
