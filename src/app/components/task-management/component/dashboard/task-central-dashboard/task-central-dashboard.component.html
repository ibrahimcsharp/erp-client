    <div class="projects-section">
      <div class="projects-section-header">
        <p>Tasks</p>
        <p class="time">{{currentDate | date:'EEEE, MMMM d, y'}}</p>
      </div>
      <div class="projects-section-line">
        <div class="projects-status">
          <div class="item-status">
            <span class="status-number">{{taskCommonService.pendingProject}}</span>
            <span class="status-type">In Progress</span>
          </div>
          <div class="item-status">
            <span class="status-number">{{taskCommonService.doneProject}}</span>
            <span class="status-type">Done</span>
          </div>
          <div class="item-status">
            <span class="status-number">{{taskCommonService.totalProject}}</span>
            <span class="status-type">Total Tasks</span>
          </div>
        </div>
      </div>
      <div class="project-boxes jsGridView gridScrollable">
        <div *ngFor="let item of taskCommonService.allTaskList;index as j;odd as odd; even as even" class="project-box-wrapper">
          <div class="project-box"  [ngStyle]="
          item.taskProgress<50
            ? { 'background-color': '#fee4cb' }
            : { 'background-color': '#c8f7dc' }
        ">
            <div class="project-box-header">
              <span>{{item.createDate}}</span>
              <div class="more-wrapper">
                <button class="project-btn-more">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-more-vertical">
                    <circle cx="12" cy="12" r="1" />
                    <circle cx="12" cy="5" r="1" />
                    <circle cx="12" cy="19" r="1" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="project-box-content-header">
              <p class="box-content-header">{{item.title | slice:0:50}}</p>
              <p class="box-content-subheader">{{item.responsibleDeptName}}</p>
            </div>
            <div class="box-progress-wrapper">
              <p class="box-progress-header">Progress</p>
              <p-progressBar [value]="item.taskProgress"></p-progressBar>   
                <!-- <div class="mb-2">
                  <progressbar [max]="100" class="progress-striped active" [value]="item.taskProgress" type="success" [striped]="true" [animate]="true"><i>{{item.taskProgress}}%</i></progressbar>
                </div>              -->
              <p class="box-progress-percentage">{{item.taskProgress}}/100</p>
            </div>
            <div class="project-box-footer">
              <div class="participants">                
                <button (click)="DetailsInfo(item)" pTooltip="Task Detail" class="add-participant" style="color: #ff942e;">
                 <i class="fa fa-list"></i>
                </button>                
                <button (click)="AddComment(item)" pTooltip="Task Comments" class="add-participant" style="color: #ff942e;">
                 <i class="fa fa-comments"></i>
                </button>          
                                
              </div>
              <!-- <div class="days-left" style="color: #ff942e;">
                2 Days Left
              </div> -->
            </div>
          </div>
        </div>       
      </div>
    </div>
