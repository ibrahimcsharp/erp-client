<section class="content-item content-item-scroll" id="comments">
    <div class="container">   
    	<div class="row">
            <div class="col-sm-12">                
                <h3>{{taskCommonService.taskCommentList.length}} Comments</h3> 
                <div *ngFor="let item of taskCommonService.taskCommentList" class="media">                    
                    
                    <div *ngIf="item.createBy==authService.decodedToken?.unique_name" style="text-align: right !important;background-color: #e0e0e0;font-weight: bold; padding-right: 20px !important;" class="media-body">
                        <p>{{item.comments}}</p>
                        <h5 class="media-heading">{{item.employeeName}}</h5>
                        <ul class="list-unstyled list-inline media-detail">
                            <li><i class="fa fa-calendar"></i>{{item.createDate | date:'d/M/y, h:mm a'}}</li>                           
                        </ul>                        
                    </div>
                    <div *ngIf="item.createBy != authService.decodedToken?.unique_name" class="media-body">
                        <h4 class="media-heading">{{item.employeeName}}</h4>
                        <p>{{item.comments}}</p>
                        <ul class="list-unstyled list-inline media-detail pull-left">
                            <li><i class="fa fa-calendar"></i>{{item.createDate | date:'d/M/y, h:mm a'}}</li>                           
                        </ul>                        
                    </div>
                </div>                
            
            </div>
        </div>
    </div>
</section>
