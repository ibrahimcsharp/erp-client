<div class="modal-header">
    <h5 class="modal-title f-w-600" id="exampleModalLabel">{{ title }} ({{model.itemName}}, Available Stock -{{model.currentStock}})</h5>
    <button type="button" class="close" aria-label="Close" (click)="bsModalRef.hide()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body">
    <form autocomplete="off" [formGroup]="reactiveForm" class="form" role="form">

        <div class="row">
            <div class="col-md-12">
                <div class="form-group">
                    <label class="control-label">Damage Qty</label>
                    <input [ngClass]="{
              'is-invalid':
              reactiveForm.get('damageQty').errors &&
                (reactiveForm.get('damageQty').touched || reactiveForm.get('damageQty').dirty)
            }" class="form-control" type="number" min="1" formControlName="damageQty" />
                </div>
                <div class="form-group">
                    <label class="control-label">Remarks</label>
                    <input class="form-control" type="text" formControlName="remarks" />
                </div>
            </div>
        </div>
    </form>
</div>
<div class="modal-footer">
    <div class="alert">
        <button type="button" (click)="onSubmit()" class="button-save mr-2" role="button">
            <i class="fa fa-save mr-2"></i> Save
        </button>
        <button (click)="OnClear()" class="button-clear mr-2" role="button">
            <i class="fa fa-refresh mr-2"></i>Clear
        </button>

        <button (click)="bsModalRef.hide()" class="button-back mr-2" role="button">
            <i class="fa fa-arrow-left mr-2"></i>Back
        </button>
    </div>
</div>
<app-snack-damage-list></app-snack-damage-list>
