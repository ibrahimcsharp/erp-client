<p-panel header="Per Employee Cost Payable" [toggleable]="true">
    <form
      [formGroup]="reactiveForm"
      class="form"
      (ngSubmit)="Process()"
      role="form"
    >
      <div class="row">
        <div class="col-md-4 offset-md-4">
          <div class="form-group">
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Month<span class="required">&nbsp;*</span></span
                >
              </div>
              <select
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('monthId').errors &&
                    (reactiveForm.get('monthId').touched ||
                      reactiveForm.get('monthId').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="monthId"
              >
                <option value="">==Select One==</option>
                <option *ngFor="let item of mmsSnackService.mealMonthsList" [ngValue]="item.id">
                  {{ item.monthName }}
                </option>
              </select>
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Year<span class="required">&nbsp;*</span></span
                >
              </div>
              <select
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('yearId').errors &&
                    (reactiveForm.get('yearId').touched ||
                      reactiveForm.get('yearId').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="yearId"
              >
                <option value="">==Select One==</option>
                <option
                  *ngFor="let year of commonService.YearSelectList"
                  [ngValue]="year.value"
                >
                  {{ year.label }}
                </option>
              </select>
            </div>           
            <button
              type="submit"
              class="btn btn-outline-success btn-block btn-xs"
            >
              <i class="fa fa-search"></i> Search
            </button>
          </div>
        </div>
      </div>
      <hr />
  
      <p-table
      #dt
      *ngIf="empList != null"
      [value]="empList"
      [globalFilterFields]="[
        'monthName',
        'yearName',
        'employeeName',
        'department',
        'employeeId',
        'totalSnacksCost',
        'totalSnacksQty'       
      ]"
      dataKey="employeeId"
      editMode="row"
      [scrollable]="true"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[5, 10, 50, 100]"
      >>
      <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="exportExcel()"
            type="button"
            class="btn btn-outline-success btn-xs mr-2"
          >
            <i class="fa fa-excel"></i>
            Excel
          </button>
  
          <input
            type="text"
            pInputText
            size="50"
            placeholder="Global Filter"
            (input)="dt.filterGlobal($event.target.value, 'contains')"
            style="float: right"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr class="bc">       
          <th>SL</th>
          <th [pSortableColumn]="'monthName'">
            Month
            <p-sortIcon
              [field]="'monthName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>
          <th [pSortableColumn]="'yearName'">
           Year
            <p-sortIcon
              [field]="'yearName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>
          <th [pSortableColumn]="'employeeName'">
            Employee Name
            <p-sortIcon
              [field]="'employeeName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>
          <th [pSortableColumn]="'employeeId'">
            Employee Id
            <p-sortIcon
              [field]="'employeeId'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>
          <th [pSortableColumn]="'department'">
              Department
            <p-sortIcon
              [field]="'department'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>
          <th  [pSortableColumn]="'totalSnacksQty'">
            Total Snacks Qty
            <p-sortIcon
              [field]="'totalSnacksQty'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>
          <th  [pSortableColumn]="'totalSnacksCost'">
            Total Snacks Cost
            <p-sortIcon
              [field]="'totalSnacksCost'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            >
            </p-sortIcon>
          </th>          
        </tr>
        <tr>
          <td></td>
          <!-- <td></td> -->
          <td>
            <input
              pInputText
              type="text"
              (input)="dt.filter($event.target.value, 'monthName', 'contains')"
              class="p-column-filter"
            />
          </td>
          <td>
            <input
              pInputText
              type="text"
              (input)="dt.filter($event.target.value, 'yearName', 'contains')"
              class="p-column-filter"
            />
          </td>
          <td>
            <input
              pInputText
              type="text"
              (input)="
                dt.filter($event.target.value, 'employeeName', 'contains')
              "
              class="p-column-filter"
            />
          </td>
          <td>
            <input
              pInputText
              type="text"
              (input)="
                dt.filter($event.target.value, 'employeeId', 'contains')
              "
              class="p-column-filter"
            />
          </td>
          <td>
            <input
              pInputText
              type="text"
              (input)="dt.filter($event.target.value, 'department', 'contains')"
              class="p-column-filter"
            />
          </td>
          <td>
            <input
              pInputText
              type="text"
              (input)="
                dt.filter($event.target.value, 'totalSnacksQty', 'contains')
              "
              class="p-column-filter"
            />
          </td>
          <td>
            <input
              pInputText
              type="text"
              (input)="dt.filter($event.target.value, 'totalSnacksCost', 'contains')"
              class="p-column-filter"
            />
          </td>  
        </tr>
      </ng-template>
      <ng-template
        pTemplate="body"
        let-rowData
        let-editing="editing"
        let-ri="rowIndex"
      >
        <tr [pEditableRow]="rowData" class="center">      
          <td>{{ ri + 1 }}</td>
          <td>{{ rowData.monthName }}</td>
          <td>{{ rowData.yearName }}</td>
          <td>{{ rowData.employeeName }}</td>
          <td>{{ rowData.employeeId }}</td>
          <td>{{ rowData.department }}</td>
          <td>{{ rowData.totalSnacksQty }}</td>
          <td>{{ rowData.totalSnacksCost }}</td>          
        </tr>
      </ng-template>
      <!-- <ng-template pTemplate="footer" class="ui-table-tfoot">
            <tr>
              <th></th>
              <th></th>
              <th></th>
              <th></th>
              <th style="text-align: right">{{ totalMonthlyCost }}</th>
              <th></th>
            </tr>
          </ng-template> -->
    </p-table>
     
    </form>
  </p-panel>
