<div class="card">
  <div class="card-header">
    <h5>{{ title }}</h5>
  </div>
  <div class="card-body">
    <form [formGroup]="reactiveForm" class="form" role="form">
      <div class="row">
        <div class="col-md-12">
          <div class="form-group">
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Month<span class="required">&nbsp;*</span></span
                >
              </div>
              <select
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('monthId').errors &&
                    (reactiveForm.get('monthId').touched ||
                      reactiveForm.get('monthId').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="monthId"
              >
                <option value="">==Select One==</option>
                <option *ngFor="let item of mealMonthsList" [ngValue]="item.id">
                  {{ item.monthName }}
                </option>
              </select>
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Year<span class="required">&nbsp;*</span></span
                >
              </div>
              <select
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('yearId').errors &&
                    (reactiveForm.get('yearId').touched ||
                      reactiveForm.get('yearId').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="yearId"
              >
                <option value="">==Select One==</option>
                <option
                  *ngFor="let year of commonService.YearSelectList"
                  [ngValue]="year.value"
                >
                  {{ year.label }}
                </option>
              </select>
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Meal Type<span class="required">&nbsp;*</span></span
                >
              </div>
              <select
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('mealType').errors &&
                    (reactiveForm.get('mealType').touched ||
                      reactiveForm.get('mealType').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="mealType"
              >
                <option value="">==Select One==</option>
                <option value="RM">Reqular Menu</option>
                <option value="SM">Special Menu</option>
              </select>
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Date<span class="required">&nbsp;*</span></span
                >
              </div>
              <input
                type="date"
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('currentDate').errors &&
                    (reactiveForm.get('currentDate').touched ||
                      reactiveForm.get('currentDate').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="currentDate"
              />
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Meal Description<span class="required">&nbsp;*</span></span
                >
              </div>
              <input
                type="text"
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('mealDes').errors &&
                    (reactiveForm.get('mealDes').touched ||
                      reactiveForm.get('mealDes').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="mealDes"
              />
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text">Image</span>
              </div>
              <input type="file" (change)="onFileChange($event)" />
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Valid From Time<span class="required">&nbsp;*</span></span
                >
              </div>
              <input
                bsDatepicker
                [bsConfig]="{ dateInputFormat: 'MM-DD-YYYY, h:mm:ss a' }"
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('fromTime').errors &&
                    (reactiveForm.get('fromTime').touched ||
                      reactiveForm.get('fromTime').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="fromTime"
              />
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text"
                  >Valid To Time<span class="required">&nbsp;*</span></span
                >
              </div>
              <input
                bsDatepicker
                [bsConfig]="{ dateInputFormat: 'MM-DD-YYYY, h:mm:ss a' }"
                [ngClass]="{
                  'is-invalid':
                    reactiveForm.get('toTime').errors &&
                    (reactiveForm.get('toTime').touched ||
                      reactiveForm.get('toTime').dirty)
                }"
                class="form-control form-control-sm"
                formControlName="toTime"
              />
            </div>
            <div class="input-group input-group-sm mb-1">
              <div class="input-group-prepend">
                <span class="input-group-text">Remarks</span>
              </div>
              <input
                type="text"
                class="form-control form-control-sm"
                formControlName="remarks"
              />
            </div>

            <!-- <button type="submit" class="btn btn-outline-success btn-block btn-xs">
                            <i class="fa fa-search"></i> POST
                        </button> -->
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="card-footer">
    <div class="alert">
      <button
        type="button"
        (click)="Process()"
        class="button-save mr-2"
        role="button"
      >
        <i class="fa fa-save mr-2"></i> Save
      </button>
      <button (click)="OnClear()" class="button-clear mr-2" role="button">
        <i class="fa fa-refresh mr-2"></i>Clear
      </button>

      <button
        (click)="bsModalRef.hide()"
        class="button-back mr-2"
        role="button"
      >
        <i class="fa fa-arrow-left mr-2"></i>Back
      </button>
    </div>
  </div>
</div>
