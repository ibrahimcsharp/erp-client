<p-panel header="Meal Items" [toggleable]="true">
    <p-table
      *ngIf="Items != null"
      [value]="Items"
      [globalFilterFields]="['categoryName','itemName', 'remarks']"
      dataKey="id"
      editMode="row"
      [scrollable]="true"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[5, 10, 50, 100]"
      >>
      <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="NewItem()"
            pTooltip="New Category"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
          <button
        (click)="exportExcel()"
        type="button"
        class="btn btn-outline-info btn-xs ml-2"
      >
        <i class="fa fa-excel"></i>
        Excel
      </button>
  
          <input
            type="text"
            pInputText
            size="50"
            placeholder="Global Filter"
            (input)="dt.filterGlobal($event.target.value, 'contains')"
            style="float: right"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr class="bc">
          <th>SL</th>
          <th [pSortableColumn]="'categoryName'">
            Category Name
            <p-sortIcon
              [field]="'categoryName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'itemName'">
            Item Name
            <p-sortIcon
              [field]="'itemName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'remarks'">
           Reamrks
            <p-sortIcon
              [field]="'upperName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
         
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template
        pTemplate="body"
        let-rowData
        let-editing="editing"
        let-ri="rowIndex"
      >
        <tr [pEditableRow]="rowData" class="center">
          <td>{{ ri + 1 }}</td>
          <td>{{ rowData.categoryName }}</td>
          <td>{{ rowData.itemName }}</td>
          <td>{{ rowData.remarks }}</td>       
  
          <td>
            <a
              class="btn btn-outline-primary btn-xs mr-2"
              (click)="EditItem(rowData)"
              ><i class="fa fa-edit"></i> Edit</a
            >            
          </td>
        </tr>
      </ng-template>
    </p-table>
    <ngx-spinner [name]="spinnerName" [fullScreen]="false" size="medium">
      <p class="loading">Loading...</p>
    </ngx-spinner>
  </p-panel>
