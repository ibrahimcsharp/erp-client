<p-panel header="Refferences List" [toggleable]="true">
  <div class="card">
    <p-table
      *ngIf="service.refferenceList != null"
      [value]="service.refferenceList"
      [globalFilterFields]="[
        'keyName',
        'name',
        'code',
        'defaultUnitName',
        'remarks'
      ]"
      dataKey="id"
      editMode="row"
      [scrollable]="true"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[5, 10, 50, 100]"
    >
      <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="OpenNew()"
            pTooltip="New Unit Type Add"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
          <button pTooltip="Delete checked row" class="btn btn-primary btn-xs" style="display: none;">
            <i class="fa fa-trash"></i> Delete
          </button>

          <input
            type="text"
            pInputText
            size="50"
            placeholder="Global Filter"
            (input)="dt.filterGlobal($event.target.value, 'contains')"
            style="float: right"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr class="bc center">
         
          <th [pSortableColumn]="'keyName'">
            Basic Type<p-sortIcon
              [field]="'keyName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'code'">
            Code<p-sortIcon
              [field]="'code'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'name'">
            Name<p-sortIcon
              [field]="'name'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'unitName'">
            Default Unit<p-sortIcon
              [field]="'unitName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'remarks'">
            Remarks<p-sortIcon
              [field]="'remarks'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template
        pTemplate="body"
        let-rowData
        let-editing="editing"
        let-ri="rowIndex"
      >
        <tr [pEditableRow]="rowData" class="center">
          <td>{{ rowData.keyName }}</td>
          <td>{{ rowData.code }}</td>
          <td>{{ rowData.name }}</td>
          <td>{{ rowData.unitName }}</td>
          <td>{{ rowData.remarks }}</td>
          <td>
            <a
              style="cursor: pointer"
              class="mr-2"
              (click)="editRefference(rowData)"
              ><i class="fa fa-edit"></i
            ></a>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-panel>

<p-dialog
  header="Refference Create"
  [(visible)]="displayBasic2"
  [style]="{ width: '50vw' }"
  [baseZIndex]="10000"
>
  <app-refference-create
    #refference
    (refferenceToCreate)="LoadRefference()"
  ></app-refference-create>
</p-dialog>
