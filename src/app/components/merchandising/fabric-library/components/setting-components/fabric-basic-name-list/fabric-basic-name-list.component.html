<p-panel header="Fabric Basic Name List" [toggleable]="true">
  <div class="card">
    <p-table
      *ngIf="service.fabricNameList != null"
      [value]="service.fabricNameList"
      [globalFilterFields]="['fabricBasicName']"
      dataKey="id"
      editMode="row"
      [scrollable]="true"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[5, 10, 50, 100]"
    >
      <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="OpenNew()"
            pTooltip="New Po Add"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
          <button pTooltip="Delete checked row" class="btn btn-primary btn-xs" style="display: none;">
            <i class="fa fa-trash"></i> Delete
          </button>

          <input
            type="text"
            pInputText
            size="50"
            placeholder="Global Filter"
            (input)="dt.filterGlobal($event.target.value, 'contains')"
            style="float: right"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr class="bc" style="text-align: center;">
      
          <th style="width: 50%;" [pSortableColumn]="'fabricBasicName'">
            Fabric Basic Name<p-sortIcon
              [field]="'fabricBasicName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template
        pTemplate="body"
        let-rowData
        let-editing="editing"
        let-ri="rowIndex"
      >
        <tr [pEditableRow]="rowData" class="center">
        
          <td style="width: 50%;">{{ rowData.fabricBasicName }}</td>
          <td>
            <a
              style="cursor: pointer"
              class="mr-2"
              (click)="editFabricBasicName(rowData)"
              ><i class="fa fa-edit"></i
            ></a>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-panel>

<p-dialog
  header="Fabric Basic Name Create"
  [(visible)]="displayBasic2"
  [style]="{ width: '50vw' }"
  [baseZIndex]="10000"
>
  <app-fabric-basic-name-create
    #fabricBasicName
    (fabricBasicNameToCreate)="LoadFabricLibrary()"
  ></app-fabric-basic-name-create>
</p-dialog>
