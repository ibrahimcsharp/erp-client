<p-panel header="Fabric Mill Name List" [toggleable]="true">
  <div class="card">
    <p-table
      *ngIf="service.millNameList != null"
      [value]="service.millNameList"
      [globalFilterFields]="['millName']"
      dataKey="id"
      editMode="row"
      [scrollable]="true"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[5, 10, 50, 100]"
      >>
      <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="OpenNew()"
            pTooltip="New Mill Name"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
          <button style="display: none;" pTooltip="Delete checked row" class="btn btn-primary btn-xs">
            <i class="fa fa-trash"></i> Delete
          </button>

          <input
            type="text"
            pInputText
            size="50"
            placeholder="Global Filter"
            (input)="dt.filterGlobal($event.target.value, 'contains')"
            style="float: right"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr class="bc center">
       
          <th [pSortableColumn]="'millName'" style="width: 50%;">
            Fabric Mill Name
            <p-sortIcon
              [field]="'millName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template
        pTemplate="body"
        let-rowData
        let-editing="editing"
        let-ri="rowIndex"
      >
        <tr [pEditableRow]="rowData" class="center">
          <td style="width: 50%;">{{ rowData.millName }}</td>
          <td>
            <a
              style="cursor: pointer"
              class="mr-2"
              (click)="editMillName(rowData)"
              ><i class="fa fa-edit"></i
            ></a>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-panel>

<p-dialog
  header="Fabric Basic Name Create"
  [(visible)]="displayBasic2"
  [style]="{ width: '50vw' }"
  [baseZIndex]="10000"
>
  <app-mill-name-create
    #fabricMillName
    (millNameToCreate)="LoadFabricMillName()"
  ></app-mill-name-create>
</p-dialog>
