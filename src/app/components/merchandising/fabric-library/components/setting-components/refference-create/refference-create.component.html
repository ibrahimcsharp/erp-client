<form [formGroup]="refferenceForm" id="refferenceForm" class="needs-validation">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <div class="input-group input-group-sm">
            <div class="input-group-prepend">
              <span class="input-group-text"
                >Code<span class="required">&nbsp;*</span></span
              >
            </div>
            <input
              type="text"
              [ngClass]="{
                'is-invalid':
                  refferenceForm.get('code').errors &&
                  (refferenceForm.get('code').touched ||
                    refferenceForm.get('code').dirty)
              }"
              id="code"
              formControlName="code"
              class="form-control"
              placeholder=" Enter Code"
            />
          </div>
          <div class="input-group input-group-sm">
            <div class="input-group-prepend">
              <span class="input-group-text"
                >Name<span class="required">&nbsp;*</span></span
              >
            </div>
            <input
              type="text"
              [ngClass]="{
                'is-invalid':
                  refferenceForm.get('name').errors &&
                  (refferenceForm.get('name').touched ||
                    refferenceForm.get('name').dirty)
              }"
              id="name"
              formControlName="name"
              class="form-control"
              placeholder=" Enter name"
            />
          </div>
          <div class="input-group input-group-sm">
            <div class="input-group-prepend">
              <span class="input-group-text"
                >Basic Type<span class="required">&nbsp;*</span></span
              >
            </div>
            <select
              class="form-control"
              [ngClass]="{
                'is-invalid':
                  refferenceForm.get('basicTypeId').errors &&
                  (refferenceForm.get('basicTypeId').touched ||
                    refferenceForm.get('basicTypeId').dirty)
              }"
              formControlName="basicTypeId"
            >
              <option
                *ngFor="let item of commonService.BasicTypeSelectList"
                [ngValue]="item.value"
              >
                {{ item.label }}
              </option>
            </select>
          </div>

          <div class="input-group input-group-sm">
            <div class="input-group-prepend">
              <span class="input-group-text">Default Unit</span>
            </div>
            <select class="form-control" formControlName="defaultUnit">
              <option
                *ngFor="let item of commonService.UnitItemmsList"
                [ngValue]="item.unitId"
              >
                {{ item.unitName }}
              </option>
            </select>
          </div>
          <div class="input-group input-group-sm">
            <div class="input-group-prepend">
              <span class="input-group-text">Remarks</span>
            </div>
            <input class="form-control" fornControlName="remarks" />
          </div>
          <hr />
          <button
            type="button"
            class="btn btn-outline-success"
            [disabled]="!refferenceForm.valid"
            (click)="onSubmit()"
          >
            <i class="fa fa-database" aria-hidden="true"></i>
            {{ saveButtonTitle }}
          </button>
          <button
            class="btn btn-outline-info ml-3"
            type="button"
            (click)="BtnClear()"
          >
            <i class="fa fa-refresh" aria-hidden="true"></i> Clear
          </button>
        </div>
      </div>
    </div>
  </div>
