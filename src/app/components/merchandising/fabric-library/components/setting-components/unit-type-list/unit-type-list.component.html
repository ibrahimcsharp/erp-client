<p-panel header="Unit Type List" [toggleable]="true">
  <div class="card">
    <p-table
      *ngIf="service.unitTypeList != null"
      [value]="service.unitTypeList"
      [globalFilterFields]="['unitName']"
      dataKey="id"
      editMode="row"
      [scrollable]="true"
      [paginator]="true"
      [rows]="10"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
      [rowsPerPageOptions]="[5, 10, 50, 100]"
    >
      <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="OpenNew()"
            pTooltip="New Unit Type Add"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
          <button pTooltip="Delete checked row" class="btn btn-primary btn-xs" style="display: none;">
            <i class="fa fa-trash"></i> Delete
          </button>

          <input
            type="text"
            pInputText
            size="50"
            placeholder="Global Filter"
            (input)="dt.filterGlobal($event.target.value, 'contains')"
            style="float: right"
          />
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr class="bc center">
        
          <th [pSortableColumn]="'unitName'">
            Unit<p-sortIcon
              [field]="'unitName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'shortName'">
            Short Name<p-sortIcon
              [field]="'shortName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'methodName'">
            Method Name<p-sortIcon
              [field]="'methodName'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'type'">
            Type<p-sortIcon
              [field]="'type'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'defaultValue'">
            Default Value<p-sortIcon
              [field]="'defaultValue'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th [pSortableColumn]="'remarks'">
            Remarks<p-sortIcon
              [field]="'remarks'"
              ariaLabel="Activate to sort"
              ariaLabelDesc="Activate to sort in descending order"
              ariaLabelAsc="Activate to sort in ascending order"
            ></p-sortIcon>
          </th>
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template
        pTemplate="body"
        let-rowData
        let-editing="editing"
        let-ri="rowIndex"
      >
        <tr [pEditableRow]="rowData" class="center">
          <td>{{ rowData.unitName }}</td>
          <td>{{ rowData.shortName }}</td>
          <td>{{ rowData.methodName }}</td>
          <td>{{ rowData.type }}</td>
          <td>{{ rowData.defaultValue }}</td>
          <td>{{ rowData.remarks }}</td>
          <td>
            <a
              style="cursor: pointer"
              class="mr-2"
              (click)="editUnitTypeName(rowData)"
              ><i class="fa fa-edit"></i
            ></a>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</p-panel>

<p-dialog
  header="Unit Type Create"
  [(visible)]="displayBasic2"
  [style]="{ width: '40vw' }"
  [baseZIndex]="10000"
>
  <app-unit-type-create
    #UnitTypeName
    (unitTypeToCreate)="LoadUnitType()"
  ></app-unit-type-create>
</p-dialog>
