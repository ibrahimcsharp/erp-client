<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
</head>

<body>
  <!DOCTYPE html>
  <html>

  <head> </head>

  <body>
    <div class="main">
      <input type="checkbox" id="chk" aria-hidden="true" />
      <h3 style="
              font-style: oblique;
              font-weight: bold;
              color: #ffffff;
              margin-left: 65px;
              font-family: Cursive;
              justify-content: center;
            ">
        Welcome To <sub>SNOWTEX ERP</sub>
      </h3>

      <div class="signup">
        <form [formGroup]="loginForm" (ngSubmit)="login()" autocomplete="off">
          <label for="chk" aria-hidden="true">Login</label>
          <input (change)="GetCompanyList()" [ngClass]="{
                  'is-invalid':
                    loginForm.get('userName').errors &&
                    (loginForm.get('userName').touched ||
                      loginForm.get('userName').dirty)
                }" type="text" formControlName="userName" placeholder="Employee Id" class="form-control" />
          <input [ngClass]="{
                  'is-invalid':
                    loginForm.get('password').errors &&
                    (loginForm.get('password').touched ||
                      loginForm.get('password').dirty)
                }" type="password" formControlName="password" name="pswd" placeholder="Password"
            class="form-control" />
          <select class="form-control" [ngClass]="{
                  'is-invalid':
                    loginForm.get('branchOfficeId').errors &&
                    (loginForm.get('branchOfficeId').touched ||
                      loginForm.get('branchOfficeId').dirty)
                }" type="text" formControlName="branchOfficeId">
            <option value="">==Select Company==</option>
            <option *ngFor="let item of companyList" [ngValue]="item.branchOfficeId">
              {{ item.companyShort }}
            </option>
          </select>

          <button [disabled]="!loginForm.valid" type="submit">Login</button>
        </form>
      </div>

      <div class="login">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <label for="chk" aria-hidden="true">Sign up</label>

          <select class="form-control" [ngClass]="{
                  'is-invalid':
                    registerForm.get('branchOfficeId').errors &&
                    (registerForm.get('branchOfficeId').touched ||
                      registerForm.get('branchOfficeId').dirty)
                }" type="text" formControlName="branchOfficeId">
            <option *ngFor="let item of commonService.CompanySelectedList" [ngValue]="item.value">
              {{ item.label }}
            </option>
          </select>

          <input class="form-control" type="text" name="pswd" formControlName="employeeId" placeholder="Employee Id"
            [ngClass]="{
                  'is-invalid':
                    registerForm.get('employeeId').errors &&
                    (registerForm.get('employeeId').touched ||
                      registerForm.get('employeeId').dirty)
                }" />
          <input class="form-control" type="password" name="pswd" formControlName="password" placeholder="Password"
            [ngClass]="{
                  'is-invalid':
                    registerForm.get('password').errors &&
                    (registerForm.get('password').touched ||
                      registerForm.get('password').dirty)
                }" />
          <input class="form-control" type="password" name="pswd" formControlName="confirmPassword"
            placeholder="Confirm Password" [ngClass]="{
                  'is-invalid':
                    registerForm.get('confirmPassword').errors &&
                    (registerForm.get('confirmPassword').touched ||
                      registerForm.get('confirmPassword').dirty)
                }" />
          <button type="submit" [disabled]="!registerForm.valid">
            Sign up
          </button>
        </form>
      </div>
    </div>
  </body>

  </html>
  <!-- partial -->
</body>

</html>
