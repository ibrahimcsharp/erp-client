<br>
<p-panel header="Approve Logistics Support" [toggleable]="true">
  <p-table #dt [value]="VehicleRequisitionModelList" dataKey="id" editMode="row" [scrollable]="true" [paginator]="true"
    [rows]="200" [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [rowsPerPageOptions]="[5, 10, 50, 100]">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 30px">SL</th>
        <th>Requisition For</th>
        <th>Pickup Location</th>
        <th>Drop Location</th>
        <th>Pickup Date Time</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
      <tr>
        <td></td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'requisitionFor', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'pickupLocation', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'dropLocation', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'startTime', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'status', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td></td>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-vehicle let-rowIndex="rowIndex">
      <tr>
        <td style="width: 30px">{{ rowIndex+1 }}</td>
        <td>{{vehicle.requisitionFor}}</td>
        <td>{{vehicle.pickupLocation}}</td>
        <td>{{vehicle.dropLocation}}</td>
        <td>{{vehicle.startTime | date:'dd/MM/yyyy'}}</td>
        <td [ngClass]="{ 'text-success':vehicle.status === 'Approve',  'text-danger':vehicle.status === 'Inactive' }">
          {{vehicle.status}}</td>

        <td>
          <button class="btn btn-xs btn-outline-primary mr-2" (click)="raject(vehicle)">
            <i class="fa fa-pencil"></i> Raject
          </button>
          <button class="btn btn-xs btn-outline-success mr-2" (click)="approve(vehicle)">
            <i class="fa fa-pencil"></i> Approve
          </button>
        </td>

      </tr>
    </ng-template>


  </p-table>
</p-panel>
