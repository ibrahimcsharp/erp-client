<p-panel header="Vehicle Type List" [toggleable]="true">
  <p-table #dt [value]="AllTypeList" dataKey="id" editMode="row" [scrollable]="true" [paginator]="true" [rows]="200"
    [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [rowsPerPageOptions]="[5, 10, 50, 100]">
    <ng-template pTemplate="caption">
      <div class="ui-helper-clearfix" style="text-align: left">
        <button (click)="OpenNew()" pTooltip="Add New Type" class="btn btn-success btn-xs mr-2">
          <i class="fa fa-plus" aria-hidden="true"></i> New
        </button>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 30px">SL</th>
        <th>Vehicle Type Name</th>
        <th>Status</th>
        <th>Remarks</th>
        <th>Action</th>
      </tr>
      <tr>
        <td></td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'typeName', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'statusName', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'remarks', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td></td>

      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-type let-rowIndex="rowIndex">
      <tr>
        <td style="width: 30px">{{ rowIndex+1 }}</td>
        <td>{{type.typeName}}</td>
        <td [ngClass]="{ 'text-success':type.statusName === 'Active',  'text-danger':type.statusName === 'Inactive' }">
          {{type.statusName}}</td>
        <td>{{type.remarks}}</td>
        <td>
          <button class="btn btn-xs btn-outline-success mr-2" (click)="EditTypes(type)">
            <i class="fa fa-pencil"></i> Edit
          </button>
        </td>

      </tr>
    </ng-template>


  </p-table>
</p-panel>

<p-dialog header="Vehicle Type Create" [(visible)]="displayCreate" [style]="{ width: '50vw' }" [baseZIndex]="10000">
  <app-vehicle-type #CreateTmsType (typeModelList)="LoadTypes()" (submitSuccess)="onChildSubmit()"></app-vehicle-type>
</p-dialog>
