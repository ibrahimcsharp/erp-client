<form [formGroup]="TypeForm">
  <section>
    <div class="row">
      <div class="col-md-12">
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <div class="input-group mb-1">
                <div class="input-group-prepend paheight col-7">
                  <span class="input-group-text col-12">Vehicle type<span class="required">&nbsp;*</span></span>
                </div>
                <input type="text" id="typeName" formControlName="typeName" class="form-control" autocomplete="off"
                  [ngClass]="{'is-invalid':TypeForm.get('typeName').errors &&(TypeForm.get('typeName').touched ||TypeForm.get('typeName').dirty)}" />
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <div class="input-group mb-1">
                <div class="input-group-prepend paheight col-5">
                  <span class="input-group-text col-12">Status<span class="required">&nbsp;*</span></span>
                </div>
                <select formControlName="status" class="p-inputtext-sm form-control uppercase">
                  <option value="">===Select One===</option>
                  <option value=1>Active</option>
                  <option value=2>Inactive</option>
                </select>
              </div>
            </div>
          </div>


          <div class="col-md-4">
            <div class="form-group">
              <div class="input-group input-group-sm">
                <textarea id="remarks" name="remarks" rows="1" cols="30" formControlName="remarks"
                  class="form-control textarea" placeholder="Please Enter Remarks..." autocomplete="off"></textarea>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group" style="padding-top: 10px">
              <button class="btn btn-s btn-outline-success mr-2 mx-3" (click)="Onsubmit()">
                <i class="fa fa-file"></i> {{ButtonName}}
              </button>
              <button class="btn btn-s btn-outline-warning" (click)="clear()">
                <i class="fa fa-refresh"></i> Clear
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

</form>
