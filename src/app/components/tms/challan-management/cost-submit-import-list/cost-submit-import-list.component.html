<p-panel header="Import Cost Submit" [toggleable]="true">
    <p-table #dt1 [value]="ChallanModelList" dataKey="id" editMode="row" [scrollable]="true" [paginator]="true"
        [rows]="200" [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
        [rowsPerPageOptions]="[5, 10, 50, 100]">
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 30px">SL</th>
                <th>Good Release Date</th>
                <th>Truck No</th>
                <th>CNF Agent Name</th>
                <th>Truck Challan No</th>
                <th>Action</th>
            </tr>

            <tr>
                <td style="width: 30px"></td>
                <td>
                    <input pInputText type="text"
                        (input)="dt1.filter($event.target.value, 'goodsReleaseDate', 'contains')"
                        class="p-column-filter" style=" width: 100%; " />
                </td>
                <td>
                    <input pInputText type="text" (input)="dt1.filter($event.target.value, 'truckNumber', 'contains')"
                        class="p-column-filter" style=" width: 100%; " />
                </td>
                <td>
                    <input pInputText type="text" (input)="dt1.filter($event.target.value, 'cnfAgentName', 'contains')"
                        class="p-column-filter" style=" width: 100%; " />
                </td>
                <td>
                    <input pInputText type="text"
                        (input)="dt1.filter($event.target.value, 'truckChallanNo', 'contains')" class="p-column-filter"
                        style=" width: 100%; " />
                </td>
                <td></td>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-challan let-rowIndex="rowIndex">

            <tr>
                <td style="width: 30px">{{ rowIndex+1 }}</td>
                <td>{{challan.goodsReleaseDate | date:'MMMM d, y'}}</td>
                <td>{{challan.truckNumber}}</td>
                <td>{{challan.cnfAgentName}}</td>
                <td>{{challan.truckChallanNo}}</td>

                <td>
                    <a type="button" target="_blank" href="/tms/costing-form-import/{{challan.id}}"
                        class="btn btn-xs btn-outline-success">
                        <i class="fa fa-edit" aria-hidden="true"></i> Edit</a>
                    <!-- <button class="btn btn-xs text-danger btn-outline-danger ml-2" (click)="deleteChallan(challan.id)">
                        Delete
                    </button> -->
                </td>

            </tr>
        </ng-template>
    </p-table>
</p-panel>
