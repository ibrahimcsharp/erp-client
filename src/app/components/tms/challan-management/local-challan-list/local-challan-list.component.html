<p-panel header="Local Challan List" [toggleable]="true">
    <p-table #dt [value]="ChallanLocalList" dataKey="id" editMode="row" [scrollable]="true" [paginator]="true"
        [rows]="10" [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
        [rowsPerPageOptions]="[5, 10, 50, 100]">
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 30px">SL</th>
                <th>Date</th>
                <th>Vehicle No</th>
                <th>Transport Vendor</th>
                <th>Delivery Challan No</th>
                <th>Action</th>
            </tr>
            <tr>
                <td style="width: 30px"></td>
                <td>
                    <input pInputText type="text" (input)="dt.filter($event.target.value, 'challandate', 'contains')"
                        class="p-column-filter" style=" width: 100%; " />
                </td>
                <td>
                    <input pInputText type="text" (input)="dt.filter($event.target.value, 'covervanno', 'contains')"
                        class="p-column-filter" style=" width: 100%; " />
                </td>
                <td>
                    <input pInputText type="text"
                        (input)="dt.filter($event.target.value, 'transportcompany', 'contains')" class="p-column-filter"
                        style=" width: 100%; " />
                </td>
                <td>
                    <input pInputText type="text" (input)="dt.filter($event.target.value, 'challanno', 'contains')"
                        class="p-column-filter" style=" width: 100%; " />
                </td>
                <td></td>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-challan let-rowIndex="rowIndex">
            <tr>
                <td style="width: 30px">{{ rowIndex+1 }}</td>
                <td>{{challan.challandate | date:'MMMM d, y'}}</td>
                <td>{{challan.covervanno}}</td>
                <td>{{challan.transportcompany}}</td>
                <td>{{challan.challanno}}</td>
                <td>
                    <a type="button" target="_blank" href="/tms/costing-form/{{challan.id}}"
                        class="btn btn-xs btn-outline-success">
                        <i class="fa fa-external-link" aria-hidden="true"></i>Arrival</a>
                    <!-- <button type="button" class="btn btn-xs btn-outline-success mr-2"
                        (click)="showChallanDialog(challan)">
                        <i class="fa fa-pencil"></i> Costing
                    </button> -->
                </td>
            </tr>
        </ng-template>
    </p-table>
</p-panel>
