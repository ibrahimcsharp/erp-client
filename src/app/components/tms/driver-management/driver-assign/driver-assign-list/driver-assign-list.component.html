<p-panel header="Driver Assignment List" [toggleable]="true">
  <p-table #dt [value]="AllDriverAssignmentList" dataKey="id" editMode="row" [scrollable]="true" [paginator]="true"
    [rows]="200" [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [rowsPerPageOptions]="[5, 10, 50, 100]">
    <!-- <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="OpenNew()"
            pTooltip="Add New Driver Assignment"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
        </div>
      </ng-template> -->
    <ng-template pTemplate="caption">
      <div class="ui-helper-clearfix" style="text-align: left">
        <button type="button" pButton icon="pi pi-file-o" iconPos="left" label="CSV" (click)="dt.exportCSV()"
          style="margin-right: 0.5em;" style="float:right;width: 60px;font-size: 12px!important;"></button>
        <button type="button" pButton icon="pi pi-file-excel" iconPos="left" label="EXCEL" (click)="exportExcel()"
          style="margin-right: 0.5em;" class="ui-button-success"
          style="float:right;width: 65px;font-size: 12px!important;"></button>
        <button type="button" pButton icon="pi pi-file-pdf" iconPos="left" label="PDF" (click)="exportPdf()"
          class="ui-button-warning" style="float:right;width: 60px;font-size: 12px!important;"></button>
        <button type="button" pButton icon="pi pi-plus" iconPos="left" label="New" (click)="OpenNew()"
          style="float:left;width: 60px;font-size: 12px!important;"></button>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 30px">SL</th>
        <th>Driver</th>
        <th>Vehicle</th>
        <th>Vehicle Type</th>
        <th>Assigned From</th>
        <th>Assigned To</th>
        <th>Action</th>

      </tr>
      <tr>
        <td></td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'driverName', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'vehicleName', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'vehicleType', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'assignFromDate', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'assignToDate', 'contains')"
            class="p-column-filter" style=" width: 100%; " />
        </td>
        <td></td>


      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-assign let-rowIndex="rowIndex">
      <tr>
        <td style="width: 30px">{{ rowIndex+1 }}</td>
        <td>{{assign.driverName}}</td>
        <td>{{assign.vehicleName}}</td>
        <td>{{assign.vehicleType}}</td>
        <td>{{assign.assignFromDate | date: 'dd MMM yyyy'}}</td>
        <td>{{assign.assignToDate | date: 'dd MMM yyyy'}}</td>
        <td><button class="btn btn-xs btn-outline-success mr-2" (click)="edit(assign)">
            <i class="fa fa-pencil"></i> Edit
          </button></td>
      </tr>
    </ng-template>


  </p-table>

<p-dialog header="Driver Assignment Create" [(visible)]="displayCreate" [style]="{ width: '50vw' }"
  [baseZIndex]="10000">
  <app-driver-assign-create #CreateTmsDriverAssign (submitSuccess)="onChildSubmit()"
    (DriverAssignmentList)="LoadDriverAssignment()"></app-driver-assign-create>
</p-dialog>
