<p-panel header="Account List" [toggleable]="true">
    <p-table #dt [value]="AllAccountList" 
    dataKey="id" editMode="row" [scrollable]="true" [paginator]="true" [rows]="200" [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
    [rowsPerPageOptions]="[5, 10, 50, 100]">
    <ng-template pTemplate="caption">
        <div class="ui-helper-clearfix" style="text-align: left">
          <button
            (click)="OpenNew()"
            pTooltip="Add New Type"
            class="btn btn-success btn-xs mr-2"
          >
            <i class="fa fa-plus" aria-hidden="true"></i> New
          </button>
        </div>
      </ng-template>
    <ng-template pTemplate="header">
       <tr>
        <th style="width: 30px">SL</th>
        <th>GL Number</th>
        <th>GL Head </th>
        <th>Status</th>
        <th>Remarks</th>
      </tr>
      <tr>
        <td></td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'glNumber', 'contains')"
            class="p-column-filter" style=" width: 100%; "/>
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'glHead', 'contains')"
            class="p-column-filter" style=" width: 100%; "/>
        </td>
        <td>
          <input pInputText type="text" (input)="dt.filter($event.target.value, 'status', 'contains')"
            class="p-column-filter" style=" width: 100%; "/>
        </td>
        <td>
            <input pInputText type="text" (input)="dt.filter($event.target.value, 'remarks', 'contains')"
              class="p-column-filter" style=" width: 100%; "/>
        </td>
          
        
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-type let-rowIndex="rowIndex">
      <tr>
        <td style="width: 30px">{{ rowIndex+1 }}</td>
    
        <td>{{type.glNumber}}</td>
        <td>{{type.glHead}}</td>        
        <td>{{type.status}}</td>
        <td>{{type.remarks}}</td>
        

        <td [ngClass]="{ 'text-success':type.statusName === 'Active',  'text-danger':type.statusName === 'Inactive' }">{{type.statusName}}</td>
        
        <td>
          <button class="btn btn-xs btn-outline-success mr-2"
                          (click)="EditTypes(type)">
                          <i class="fa fa-pencil"></i> Edit
                        </button>
        </td>
       
      </tr>
    </ng-template>
  
    
    </p-table>
  </p-panel>

  <p-dialog header="Account Create"  [(visible)]="displayCreate" [style]="{ width: '70vw' }" [baseZIndex]="10000">    
    <app-account-management #CreateGLAccount (AccountList)="LoadAccounts()"></app-account-management>    
  </p-dialog>
