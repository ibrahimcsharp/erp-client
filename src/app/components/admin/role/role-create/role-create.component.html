<!-- <p-panel header="Role Create" [toggleable]="true"> -->
    <p-messages [value]="msgs"></p-messages>
<form [formGroup]="roleForm" id="roleForm" class="needs-validation">
    <div class="row">
        <div class="col-sm-4">
            <div class="form-group">
                <div class="input-group input-group-sm">
                    <div class="input-group-prepend">
                        <span class="input-group-text">Role Name<span class="required">&nbsp;*</span></span>
                    </div>
                    <input type="text" [ngClass]="{ 
                'is-invalid': 
                    roleForm.get('roleName').errors
                    && (roleForm.get('roleName').touched 
                    || (roleForm.get('roleName').dirty)) }" id="roleName" formControlName="roleName"
                        class="form-control" />
                </div>
            </div>
        </div>
    <!-- </div>
    <div class="row"> -->
        <div class="col-md-4">
            <div class="form-group">
                <button type="button" class="btn btn-outline-success btn-xs" [disabled]="!roleForm.valid"
                    (click)="onSubmit()"><i class="fa fa-database" aria-hidden="true"></i> {{saveButtonTitle}}</button>
                &nbsp;
                <button class="btn btn-outline-success btn-xs" type="button" (click)="BtnClear()"><i
                        class="fa fa-refresh" aria-hidden="true"></i> Clear</button>
            </div>
        </div>
    </div>
</form>

<!-- </p-panel> -->
<p-confirmDialog [style]="{ width: '50vw' }" key="positionDialog" [position]="position" [baseZIndex]="10000">
</p-confirmDialog>
