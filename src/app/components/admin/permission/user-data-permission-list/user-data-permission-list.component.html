<p-panel header="User Data Permission" [toggleable]="true">
  <p-tabView>
    <p-tabPanel header="Data Permission List">
      <p-table
        #dt
        *ngIf="UserDataPermissionList.length > 0"
        [value]="UserDataPermissionList"
        [globalFilterFields]="[
          'userName',
          'roleName',
          'menuName',
          'actionName'
        ]"
        dataKey="id"
        editMode="row"
        [scrollable]="true"
        [paginator]="true"
        [rows]="10"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
        [rowsPerPageOptions]="[5, 10, 50, 100]"
        >>
        <ng-template pTemplate="caption">
          <div class="ui-helper-clearfix" style="text-align: left">
            <input
              type="text"
              pInputText
              size="50"
              placeholder="Global Filter"
              (input)="dt.filterGlobal($event.target.value, 'contains')"
              style="float: right"
            />
          </div>
        </ng-template>
        <ng-template pTemplate="header">
          <tr class="bc">
            <th>SL</th>
            <th [pSortableColumn]="'userName'">Employee Id</th>
            <th [pSortableColumn]="'roleName'">Role</th>
            <th [pSortableColumn]="'menuName'">Menu</th>
            <th [pSortableColumn]="'actionName'">Action</th>
            <th>Action</th>
          </tr>
          <tr>
            <td></td>
            <td>
              <input
                pInputText
                type="text"
                (input)="dt.filter($event.target.value, 'userName', 'contains')"
                class="p-column-filter"
              />
            </td>
            <td>
              <input
                pInputText
                type="text"
                (input)="dt.filter($event.target.value, 'roleName', 'contains')"
                class="p-column-filter"
              />
            </td>
            <td>
              <input
                pInputText
                type="text"
                (input)="dt.filter($event.target.value, 'menuName', 'contains')"
                class="p-column-filter"
              />
            </td>
            <td>
              <input
                pInputText
                type="text"
                (input)="
                  dt.filter($event.target.value, 'actionName', 'contains')
                "
                class="p-column-filter"
              />
            </td>
            <td></td>
          </tr>
        </ng-template>
        <ng-template
          pTemplate="body"
          let-rowData
          let-editing="editing"
          let-ri="rowIndex"
        >
          <tr [pEditableRow]="rowData" class="center">
            <td>{{ ri + 1 }}</td>
            <td>{{ rowData.userName }}</td>
            <td>{{ rowData.roleName }}</td>
            <td>{{ rowData.menuName }}</td>
            <td>{{ rowData.actionName }}</td>
            <td></td>
          </tr>
        </ng-template>
      </p-table>
    </p-tabPanel>
    <p-tabPanel header="Data Permission">
      <app-user-data-permission></app-user-data-permission>
    </p-tabPanel>
    <p-tabPanel header="Menu Permission">
      <app-user-menu-permission></app-user-menu-permission>
    </p-tabPanel>
    <!-- <p-tabPanel header="Header 3"> Content 3 </p-tabPanel> -->
  </p-tabView>
</p-panel>
