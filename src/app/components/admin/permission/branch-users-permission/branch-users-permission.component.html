<p-table
  #dt
  [value]="branchUsers"
  [globalFilterFields]="['userName', 'email', 'phoneNumber']"
  dataKey="id"
  editMode="row"
  [scrollable]="true"
  [paginator]="true"
  [rows]="10"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries"
  [rowsPerPageOptions]="[5, 10, 50, 100]"
  >>
  <ng-template pTemplate="caption">
    <div class="ui-helper-clearfix" style="text-align: left">
      <button (click)="SaveChanges()" class="btn btn-success btn-xs">
        <i class="fa fa-save"></i> Save Changes
      </button>

      <input
        type="text"
        pInputText
        size="50"
        placeholder="Global Filter"
        (input)="dt.filterGlobal($event.target.value, 'contains')"
        style="float: right"
      />
    </div>
  </ng-template>
  <ng-template pTemplate="header">
    <tr class="bc">
      <th>SL</th>
      <th [pSortableColumn]="'brachOfficeName'">Branch Name</th>
      <th [pSortableColumn]="'isSelected'">Permission</th>
      <th [pSortableColumn]="'isDefault'">Is Default</th>
    </tr>
    <tr>
      <td></td>
      <td>
        <input
          pInputText
          type="text"
          (input)="
            dt.filter($event.target.value, 'brachOfficeName', 'contains')
          "
          class="p-column-filter uppercase"
        />
      </td>
      <td>
        <input type="checkbox" name="checkAll" (click)="CheckAll($event)" />
      </td>
      <td></td>
    </tr>
  </ng-template>
  <ng-template
    pTemplate="body"
    let-rowData
    let-editing="editing"
    let-ri="rowIndex"
  >
    <tr [pEditableRow]="rowData" class="center">
      <td>{{ ri + 1 }}</td>
      <td>{{ rowData.branchOfficeName }}</td>
      <td>
        <input type="checkbox" [(ngModel)]="rowData.isSelected" />
      </td>
      <td>
        <input type="checkbox" [(ngModel)]="rowData.isDefault" />
      </td>
    </tr>
  </ng-template>
</p-table>
