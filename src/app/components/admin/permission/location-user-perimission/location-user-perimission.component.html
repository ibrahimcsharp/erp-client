<div class="modal-header">
  <h5 class="modal-title f-w-600" id="exampleModalLabel">{{ title }}</h5>
  <button
    type="button"
    class="close"
    aria-label="Close"
    (click)="bsModalRef.hide()"
  >
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body">
  <p-table
    #dt
    [value]="res"
    [globalFilterFields]="['companyName', 'locationName']"
    dataKey="id"
    editMode="row"
    [scrollable]="true"
    scrollHeight="450px"
    >>
    <ng-template pTemplate="caption">
      <div class="ui-helper-clearfix" style="text-align: left">
        <input
          type="text"
          pInputText
          size="50"
          placeholder="Global Filter"
          (input)="dt.filterGlobal($event.target.value, 'contains')"
          style="float: right"
        />
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <!-- <th>SL</th> -->
        <th [pSortableColumn]="'locationName'">Location</th>
        <th [pSortableColumn]="'companyName'">Company</th>

        <th [pSortableColumn]="'isSelected'">Permission</th>
        <th [pSortableColumn]="'isDefault'">Is Default</th>
      </tr>
      <tr>
        <!-- <td></td> -->
        <td>
          <input
            placeholder="Search...."
            pInputText
            type="text"
            (input)="dt.filter($event.target.value, 'locationName', 'contains')"
            class="p-column-filter uppercase"
          />
        </td>
        <td>
          <input
            placeholder="Search...."
            pInputText
            type="text"
            (input)="dt.filter($event.target.value, 'companyName', 'contains')"
            class="p-column-filter uppercase"
          />
        </td>

        <td style="text-align: left">
          <input type="checkbox" name="checkAll" (click)="CheckAll($event)" />
        </td>
        <td></td>
      </tr>
    </ng-template>
    <ng-template
      pTemplate="body"
      let-rowData
      let-editing="editing"
      let-ri="rowIndex"
    >
      <tr [pEditableRow]="rowData">
        <!-- <td>{{ ri + 1 }}</td> -->
        <td style="text-align: center">{{ rowData.locationName }}</td>
        <td style="text-align: center">{{ rowData.companyName }}</td>
        <td style="text-align: left">
          <input type="checkbox" [(ngModel)]="rowData.isSelected" />
        </td>
        <td>
          <input type="checkbox" [(ngModel)]="rowData.isDefault" />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
<div class="modal-footer">
  <div class="alert">
    <button
      appDebounceClick
      [debounceTime]="700"
      type="button"
      (click)="SaveChanges()"
      class="button-save mr-2"
      role="button"
    >
      <i class="fa fa-save mr-2"></i> Save
    </button>
    <button (click)="bsModalRef.hide()" class="button-back mr-2" role="button">
      <i class="fa fa-arrow-left mr-2"></i>Back
    </button>
  </div>
</div>
