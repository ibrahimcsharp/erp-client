<p-panel header="Skill Plan" [toggleable]="true">
    <ng-template pTemplate="icons">
      <button pButton class="p-panel-header-icon p-link" (click)="menu.toggle($event)">
        <span class="pi pi-cog"></span>
      </button>
      <p-menu #menu id="config_menu" [model]="items" [popup]="true"></p-menu>
    </ng-template>
  
    <div class="row">
      <div class="col-md-12">
        <p-table #dt rowExpandMode="single" expandableRows="true" [value]="SkillPlanCourseListData"
          [globalFilterFields]="['']" dataKey="id" editMode="row" [scrollable]="true" scrollHeight="400px">
  
          <ng-template pTemplate="header">
            <tr class="bc">
  
              <th
                style=" padding: 2px 3px !important; color: black !important; background-color: #D7BDE2 !important; text-align: center; font-size: 12px; font-weight: bold;">
                SL</th>
              <th
                style=" padding: 2px 3px !important; color: black !important; background-color: #D7BDE2 !important; text-align: center; font-size: 12px; font-weight: bold;">
                Deapartment</th>
              <th
                style=" padding: 2px 3px !important; color: black !important; background-color: #D7BDE2 !important; text-align: center; font-size: 12px; font-weight: bold;">
                Training Type</th>
              <th
                style=" padding: 2px 3px !important; color: black !important; background-color: #D7BDE2 !important; text-align: center; font-size: 12px; font-weight: bold;">
                Training Name</th>
              <th
                style=" padding: 2px 3px !important; color: black !important; background-color: #D7BDE2 !important; text-align: center; font-size: 12px; font-weight: bold;">
                Files</th>
                <td style=" padding: 2px 3px !important; color: black !important; background-color: #D7BDE2 !important; text-align: center; font-size: 12px; font-weight: bold;">
                </td>
  
            </tr>
            <tr>
  
              <td
                style="padding: 2px 3px !important; color: black !important; background-color: #dee2e6 !important; text-align: center; font-size: 12px; font-weight: bold;">
              </td>
              <td>
                <input pInputText type="text" (input)="dt.filter($event.target.value, 'departmentName', 'contains')"
                  class="p-column-filter" />
              </td>
              <td>
                <input pInputText type="text" (input)="dt.filter($event.target.value, 'typeName', 'contains')"
                  class="p-column-filter" />
              </td>
              <td>
                <input pInputText type="text" (input)="dt.filter($event.target.value, 'trainingName', 'contains')"
                  class="p-column-filter" />
              </td>
              <td
                style="padding: 2px 3px !important; color: black !important; background-color: #dee2e6 !important; text-align: center; font-size: 12px; font-weight: bold;">
              </td>
              <td style="padding: 2px 3px !important; color: black !important; background-color: #dee2e6 !important; text-align: center; font-size: 12px; font-weight: bold;">
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-rowData let-expanded="expanded" let-ri="rowIndex">
            <tr
              style="padding: 2px 3px !important; color: black !important; background-color: #dee2e6 !important; text-align: center; font-size: 12px; font-weight: bold;">
              <td>{{ri+1}}</td>
              <td>{{rowData.departmentName}}</td>
              <td>{{rowData.typeName}}</td>
              <td>{{rowData.trainingName}}</td>
              <td> <input type="file" #inputFile multiple (change)="onFileSelect($event, rowData)"/></td>
              <td>
                <button placement="right" type="button" class="btn btn-primary btn-xs" (click)="submitFile(rowData)">
                  <i class="fa fa-upload"> Upload </i>
                </button>
                <!-- <button placement="right" type="button" class="btn btn-primary btn-xs" (click)="ShowFiles(rowData)"
                  [outsideClick]="true" [popover]="commonFilesListTemplate">
                  <i class="fa fa-file"></i>
                </button> -->
              </td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
  
  </p-panel>
  
  <ng-template #commonFilesListTemplate>
    <p-table #dt *ngIf="displayBasic" [value]="commonService.commonFilesList" dataKey="id" [scrollable]="true"
      scrollHeight="200px">
  
      <ng-template pTemplate="header">
        <tr style="border: 0 !important" class="bc">
          <th style="width: 40px; position: relative;">SL</th>
          <th style="width: 80px;">File</th>
        </tr>
  
      </ng-template>
      <ng-template pTemplate="body" let-rowData let-ri="rowIndex">
        <tr style="border: 0 !important" [pEditableRow]="rowData" class="center">
          <td style="width: 40px; position: relative;">{{ ri + 1 }}</td>
          <td style="width: 80px;"> <a href="{{url}}{{ rowData.location}}" target="_blank">{{rowData.docTitle}}</a>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </ng-template>
